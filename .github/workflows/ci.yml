name: CI

on:
  push:
    branches: [main, master]
  pull_request:

# Pin Sui CLI to a **mainnet** GitHub release (ubuntu-x86_64). Bump SUI_RELEASE_TAG when upgrading toolchain.
env:
  SUI_RELEASE_TAG: mainnet-v1.71.1

jobs:
  move:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Sui CLI (GitHub release binary)
        run: |
          set -euo pipefail
          mkdir -p "$HOME/bin"
          curl -fsSL "https://github.com/MystenLabs/sui/releases/download/${SUI_RELEASE_TAG}/sui-${SUI_RELEASE_TAG}-ubuntu-x86_64.tgz" -o /tmp/sui.tgz
          tar -xzf /tmp/sui.tgz -C "$HOME/bin"
          chmod +x "$HOME/bin/sui"
          echo "$HOME/bin" >> "$GITHUB_PATH"
          sui --version
      - name: Move build & test
        working-directory: packages/sui-contracts
        run: |
          sui move build
          sui move test

  js:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          # Must match root package.json "packageManager" (pnpm/action-setup rejects mismatch).
          version: 10.18.2
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
      - name: Install
        run: pnpm install
      - name: Native deps (better-sqlite3)
        run: pnpm rebuild better-sqlite3
      - name: Unit tests (local-memory)
        run: pnpm test
      - name: Turbo
        run: pnpm exec turbo run lint check build
