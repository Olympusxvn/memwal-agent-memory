name: CI

on:
  push:
    branches: [main, master]
  pull_request:

# Pin Sui CLI to a **mainnet** GitHub release (ubuntu-x86_64). Bump SUI_RELEASE_TAG when upgrading toolchain.
# Release assets: https://github.com/MystenLabs/sui/releases (filename: sui-<tag>-ubuntu-x86_64.tgz)
env:
  SUI_RELEASE_TAG: mainnet-v1.71.1

jobs:
  move:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Cache extracted binaries (runner workspace — path is always valid for actions/cache).
      - name: Cache Sui CLI
        uses: actions/cache@v4
        id: sui-cli
        with:
          path: .cache/sui-cli
          key: sui-${{ env.SUI_RELEASE_TAG }}-ubuntu-x86_64-v3

      - name: Download and extract Sui CLI
        if: steps.sui-cli.outputs.cache-hit != 'true'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p .cache/sui-cli
          curl -fsSL \
            "https://github.com/MystenLabs/sui/releases/download/${SUI_RELEASE_TAG}/sui-${SUI_RELEASE_TAG}-ubuntu-x86_64.tgz" \
            -o /tmp/sui.tgz
          tar -xzf /tmp/sui.tgz -C .cache/sui-cli
          chmod +x .cache/sui-cli/sui

      - name: Verify Sui CLI and set SUI_BINARY
        shell: bash
        run: |
          set -euo pipefail
          SUI_BIN="${GITHUB_WORKSPACE}/.cache/sui-cli/sui"
          test -x "$SUI_BIN"
          echo "SUI_BINARY=$SUI_BIN" >> "$GITHUB_ENV"
          # Also put on PATH for any nested tooling that shells out to `sui`.
          echo "${GITHUB_WORKSPACE}/.cache/sui-cli" >> "$GITHUB_PATH"
          "$SUI_BIN" --version

      - name: Move build & test
        working-directory: packages/sui-contracts
        shell: bash
        run: |
          set -euo pipefail
          "$SUI_BINARY" move build
          "$SUI_BINARY" move test

  js:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          # Must match root package.json "packageManager" (pnpm/action-setup rejects mismatch).
          version: 10.18.2
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Native deps (better-sqlite3)
        run: pnpm rebuild better-sqlite3

      - name: Unit tests (packages)
        run: pnpm test

      - name: Turbo (lint, check, build)
        run: pnpm exec turbo run lint check build
